name: Build Android APK (Cloud Build)

on:
  push:
    branches: [ main, master, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Web Folder
        run: |
          mkdir -p www
          cp -r index.html manifest.json sw.js css js www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true

      - name: Install Dependencies
        run: npm install

      - name: Setup Capacitor Android
        run: |
          npx cap add android || true
          npx cap copy android || true
          npx cap update android || true

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: To-do-LIST-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
